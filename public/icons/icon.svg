    <rect x="230" y="212" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="216" y="234" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="230" y="234" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="270" y="190" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="284" y="190" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="270" y="212" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="284" y="212" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="270" y="234" width="12" height="12" rx="2" fill="#EBB877"/>
    <rect x="284" y="234" width="12" height="12" rx="2" fill="#EBB877"/>
    <!-- base -->
